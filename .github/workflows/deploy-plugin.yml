name: Deploy goodbyehair-booking

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy plugin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /STRATO-apps/wordpress_05/app/wp-content/plugins/goodbyehair-booking/
          exclude: |
            **/.git*
            **/.github/**
            **/.DS_Store
            **/README.md
