name: Build Plugin ZIP

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build plugin folder
        run: |
          mkdir -p build/goodbyehair-booking
          cp goodbyehair-booking.php build/goodbyehair-booking/
          cd build
          zip -r goodbyehair-booking.zip goodbyehair-booking

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/goodbyehair-booking.zip
