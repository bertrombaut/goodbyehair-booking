name: Build Plugin ZIP

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create plugin zip
        run: |
          mkdir goodbyehair-booking
          cp -r * goodbyehair-booking/
          zip -r goodbyehair-booking.zip goodbyehair-booking -x "*.git*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: goodbyehair-booking.zip

